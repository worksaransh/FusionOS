<svg viewBox="0 0 1200 920" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1200" height="920" fill="#ffffff"/>

  <text x="600" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#10151b">FusionOS — Modular Monolith Architecture</text>
  <text x="600" y="56" text-anchor="middle" font-size="13" fill="#5b6472">.NET 8 backend (Clean Architecture per module, CQRS/MediatR) + React 19/TypeScript frontend</text>

  <!-- Browser -->
  <rect x="440" y="80" width="320" height="50" rx="8" fill="#eef3ff" stroke="#2454ff" stroke-width="1.5"/>
  <text x="600" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#10151b">Browser — React 19 SPA (Vite, Tailwind)</text>

  <line x1="600" y1="130" x2="600" y2="158" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API Host -->
  <rect x="260" y="160" width="680" height="66" rx="8" fill="#fff8e5" stroke="#b45309" stroke-width="1.5"/>
  <text x="600" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#10151b">FusionOS.Api.Host</text>
  <text x="600" y="204" text-anchor="middle" font-size="11.5" fill="#5b6472">JWT auth (global fallback policy) · Rate limiting · CORS · RFC 7807 problem details · OpenTelemetry · Swagger</text>

  <line x1="600" y1="226" x2="600" y2="252" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Implemented modules -->
  <text x="140" y="248" font-size="12" font-weight="700" fill="#2454ff">Implemented modules (real business logic)</text>
  <g font-size="12">
    <!-- Core -->
    <rect x="70" y="256" width="150" height="86" rx="8" fill="#eef3ff" stroke="#2454ff" stroke-width="1.5"/>
    <text x="145" y="278" text-anchor="middle" font-weight="700" fill="#10151b">Core</text>
    <text x="145" y="296" text-anchor="middle" font-size="10.5" fill="#5b6472">Company, Auth, RBAC</text>
    <text x="145" y="312" text-anchor="middle" font-size="9.5" fill="#5b6472">Domain / Application /</text>
    <text x="145" y="325" text-anchor="middle" font-size="9.5" fill="#5b6472">Infrastructure / Api</text>

    <!-- Inventory -->
    <rect x="240" y="256" width="150" height="86" rx="8" fill="#eef3ff" stroke="#2454ff" stroke-width="1.5"/>
    <text x="315" y="278" text-anchor="middle" font-weight="700" fill="#10151b">Inventory</text>
    <text x="315" y="296" text-anchor="middle" font-size="10.5" fill="#5b6472">Product, Stock Ledger</text>
    <text x="315" y="312" text-anchor="middle" font-size="9.5" fill="#5b6472">Domain / Application /</text>
    <text x="315" y="325" text-anchor="middle" font-size="9.5" fill="#5b6472">Infrastructure / Api</text>

    <!-- Warehouse -->
    <rect x="410" y="256" width="150" height="86" rx="8" fill="#eef3ff" stroke="#2454ff" stroke-width="1.5"/>
    <text x="485" y="278" text-anchor="middle" font-weight="700" fill="#10151b">Warehouse</text>
    <text x="485" y="296" text-anchor="middle" font-size="10.5" fill="#5b6472">Warehouse, Zones,</text>
    <text x="485" y="309" text-anchor="middle" font-size="10.5" fill="#5b6472">Goods Receipts</text>
    <text x="485" y="325" text-anchor="middle" font-size="9.5" fill="#5b6472">Domain/App/Infra/Api</text>

    <!-- Procurement -->
    <rect x="580" y="256" width="150" height="86" rx="8" fill="#eef3ff" stroke="#2454ff" stroke-width="1.5"/>
    <text x="655" y="278" text-anchor="middle" font-weight="700" fill="#10151b">Procurement</text>
    <text x="655" y="296" text-anchor="middle" font-size="10.5" fill="#5b6472">Supplier,</text>
    <text x="655" y="309" text-anchor="middle" font-size="10.5" fill="#5b6472">Purchase Orders</text>
    <text x="655" y="325" text-anchor="middle" font-size="9.5" fill="#5b6472">Domain/App/Infra/Api</text>

    <!-- Sales -->
    <rect x="750" y="256" width="150" height="86" rx="8" fill="#eef3ff" stroke="#2454ff" stroke-width="1.5"/>
    <text x="825" y="278" text-anchor="middle" font-weight="700" fill="#10151b">Sales</text>
    <text x="825" y="296" text-anchor="middle" font-size="10.5" fill="#5b6472">Customer, Sales Orders,</text>
    <text x="825" y="309" text-anchor="middle" font-size="10.5" fill="#5b6472">Invoices, Dispatches</text>
    <text x="825" y="325" text-anchor="middle" font-size="9.5" fill="#5b6472">Domain/App/Infra/Api</text>

    <!-- Finance -->
    <rect x="920" y="256" width="150" height="86" rx="8" fill="#eef3ff" stroke="#2454ff" stroke-width="1.5"/>
    <text x="995" y="278" text-anchor="middle" font-weight="700" fill="#10151b">Finance</text>
    <text x="995" y="296" text-anchor="middle" font-size="10.5" fill="#5b6472">Accounts, Journal</text>
    <text x="995" y="309" text-anchor="middle" font-size="10.5" fill="#5b6472">Entries, AR Ledger</text>
    <text x="995" y="325" text-anchor="middle" font-size="9.5" fill="#5b6472">Domain/App/Infra/Api</text>
  </g>

  <!-- connectors down to kafka -->
  <g stroke="#5b6472" stroke-width="1.5">
    <line x1="145" y1="342" x2="145" y2="368"/>
    <line x1="315" y1="342" x2="315" y2="368"/>
    <line x1="485" y1="342" x2="485" y2="368"/>
    <line x1="655" y1="342" x2="655" y2="368"/>
    <line x1="825" y1="342" x2="825" y2="368"/>
    <line x1="995" y1="342" x2="995" y2="368"/>
  </g>

  <!-- Kafka event bus band -->
  <rect x="70" y="368" width="1000" height="56" rx="8" fill="#fff4e5" stroke="#b45309" stroke-width="1.5" stroke-dasharray="0"/>
  <text x="570" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#10151b">Kafka Event Bus — outbox publish (at-least-once) + idempotent consumers</text>
  <text x="570" y="408" text-anchor="middle" font-size="10.5" fill="#5b6472">GoodsReceiptLineReceived · DispatchLineDispatched · InvoiceIssued · PurchaseOrderApproved · JournalEntryPosted · CompanyCreated</text>

  <line x1="570" y1="424" x2="570" y2="450" stroke="#5b6472" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Postgres -->
  <rect x="270" y="452" width="600" height="50" rx="8" fill="#eefdf5" stroke="#12805c" stroke-width="1.5"/>
  <text x="570" y="482" text-anchor="middle" font-size="13" font-weight="700" fill="#10151b">PostgreSQL — one schema per module (core, inventory, warehouse, procurement, sales, finance, ...)</text>

  <!-- Scaffolded modules -->
  <text x="140" y="536" font-size="12" font-weight="700" fill="#9aa2b1">Scaffolded only — Phase F (no business logic yet)</text>
  <g font-size="11" fill="#5b6472">
    <rect x="70" y="546" width="106" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="123" y="573" text-anchor="middle">Manufacturing</text>

    <rect x="186" y="546" width="106" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="239" y="573" text-anchor="middle">CRM</text>

    <rect x="302" y="546" width="106" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="355" y="573" text-anchor="middle">HRMS</text>

    <rect x="418" y="546" width="106" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="471" y="573" text-anchor="middle">Quality</text>

    <rect x="534" y="546" width="106" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="587" y="565" text-anchor="middle">Maintenance</text>

    <rect x="650" y="546" width="120" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="710" y="565" text-anchor="middle">Business</text>
    <text x="710" y="578" text-anchor="middle">Intelligence</text>

    <rect x="786" y="546" width="106" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="839" y="573" text-anchor="middle">AI</text>

    <rect x="902" y="546" width="106" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="955" y="573" text-anchor="middle">Marketplace</text>

    <rect x="1018" y="546" width="112" height="46" rx="6" fill="#f4f5f7" stroke="#9aa2b1" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="1074" y="565" text-anchor="middle">Integration</text>
    <text x="1074" y="578" text-anchor="middle">Hub</text>
  </g>

  <!-- Shared building blocks -->
  <rect x="70" y="618" width="1060" height="60" rx="8" fill="#f4f5f7" stroke="#5b6472" stroke-width="1.2"/>
  <text x="600" y="640" text-anchor="middle" font-size="12.5" font-weight="700" fill="#10151b">Shared Building Blocks</text>
  <text x="600" y="660" text-anchor="middle" font-size="10.5" fill="#5b6472">SharedKernel (base entities, tenant/audit interfaces) · BuildingBlocks.Application (MediatR pipeline: logging → validation → authorization → tenant isolation → audit) · BuildingBlocks.Infrastructure (outbox, processed-event ledger) · EventBus (Kafka)</text>

  <!-- Observability -->
  <rect x="70" y="698" width="1060" height="80" rx="8" fill="#eefdf5" stroke="#12805c" stroke-width="1.5"/>
  <text x="600" y="722" text-anchor="middle" font-size="12.5" font-weight="700" fill="#10151b">Observability</text>
  <text x="600" y="744" text-anchor="middle" font-size="11" fill="#5b6472">API Host --OTLP (traces + metrics)--&gt; otel-collector · API Host --/metrics--&gt; Prometheus · API Host --logs--&gt; Loki</text>
  <text x="600" y="762" text-anchor="middle" font-size="11" fill="#5b6472">Grafana --&gt; Prometheus + Loki datasources (auto-provisioned)</text>

  <!-- CI/CD -->
  <rect x="70" y="794" width="1060" height="70" rx="8" fill="#f4f5f7" stroke="#5b6472" stroke-width="1.2"/>
  <text x="600" y="818" text-anchor="middle" font-size="12.5" font-weight="700" fill="#10151b">Delivery</text>
  <text x="600" y="840" text-anchor="middle" font-size="11" fill="#5b6472">CI (build + test + lint + Vitest + Playwright + Docker build) on every push/PR --&gt; CD publishes both images to GHCR on merge to main</text>
  <text x="600" y="854" text-anchor="middle" font-size="10" fill="#9aa2b1">Dependabot keeps NuGet / npm / Docker / GitHub Actions current — weekly</text>

  <text x="600" y="900" text-anchor="middle" font-size="10.5" fill="#9aa2b1">Solid blue = real, working code · Dashed gray = scaffolded only, no business logic (Phase F)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5b6472"/>
    </marker>
  </defs>
</svg>
