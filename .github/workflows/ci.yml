# FusionOS CI — 02_TECH_STACK.md §9. Runs on every push/PR: backend build+test,
# frontend lint+unit-test+build, a Playwright E2E smoke pass, and a Docker
# image build to catch Dockerfile drift early.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fusionos_test
          POSTGRES_USER: fusionos
          POSTGRES_PASSWORD: fusionos
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fusionos -d fusionos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore FusionOS.sln

      - name: Build
        working-directory: backend
        run: dotnet build FusionOS.sln --no-restore -c Release

      - name: Test
        working-directory: backend
        run: dotnet test FusionOS.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx"
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=fusionos_test;Username=fusionos;Password=fusionos"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/**/TestResults/**/*.trx

  frontend:
    name: Frontend (lint + unit test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check + unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: Frontend (Playwright E2E smoke)
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Publish Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: fusionos-api:ci

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: fusionos-web:ci
