server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router handles client-side routes (03_SYSTEM_ARCHITECTURE.md §9).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxies to the API host container in docker-compose.yml; overridden per
    # environment in real deployments (behind the API gateway seam, 02_TECH_STACK.md §6).
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
