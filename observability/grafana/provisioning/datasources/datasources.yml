# Auto-provisions Grafana's two datasources on container start so a fresh
# `docker compose up` gives a working Grafana with Loki (logs) and Prometheus
# (metrics) already wired — no manual "Add data source" click-through.
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
